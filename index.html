<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aiden</title>
    <style>
        /* =========================================
           CSS 样式设置 (融合像素风、蒸汽波、赛博朋克)
           ========================================= */
        :root {
            --bg-color: #0a0514;
            --panel-bg: rgba(20, 10, 35, 0.85);
            --primary-color: #b026ff; /* 霓虹紫 */
            --secondary-color: #00f0ff; /* 赛博青 */
            --text-main: #e0d8f0;
            --text-muted: #8a7baf;
            --border-color: #5c1b8a;
            --msg-user-bg: rgba(176, 38, 255, 0.2);
            --msg-bot-bg: rgba(0, 240, 255, 0.1);
            --font-pixel: 'Courier New', Courier, monospace; /* 替代像素字体 */
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 蒸汽波网格背景 */
            background-image: 
                linear-gradient(transparent 95%, rgba(176, 38, 255, 0.15) 95%),
                linear-gradient(90deg, transparent 95%, rgba(176, 38, 255, 0.15) 95%);
            background-size: 30px 30px;
            background-position: center bottom;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.2);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        /* 顶部导航栏 */
        header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(20,10,35,1) 0%, rgba(60,15,90,1) 100%);
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 2px 10px rgba(176, 38, 255, 0.3);
            z-index: 10;
        }

        .avatar-container {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid var(--secondary-color);
            overflow: hidden;
            margin-right: 15px;
            background-color: #1a0b2e;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 8px var(--secondary-color);
        }

        /* 预留的头像占位符，可替换 src */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* 替换图片后改为 block */
        }

        /* 紫色二十面骰 Logo (SVG) */
        .d20-logo {
            width: 35px;
            height: 35px;
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 2;
            filter: drop-shadow(0 0 3px var(--primary-color));
        }

        .header-info {
            flex: 1;
        }

        .char-name {
            font-family: var(--font-pixel);
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px var(--primary-color), 2px 2px 0px rgba(0,240,255,0.5);
            letter-spacing: 1px;
        }

        .char-status {
            font-size: 0.8rem;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            margin-top: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--secondary-color);
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 5px var(--secondary-color);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 聊天记录区 */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        #chat-area::-webkit-scrollbar {
            width: 6px;
        }
        #chat-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            font-size: 0.95rem;
        }

        .msg-user {
            align-self: flex-end;
            background-color: var(--msg-user-bg);
            border: 1px solid var(--primary-color);
            border-bottom-right-radius: 0;
            color: #fff;
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.1);
        }

        .msg-bot {
            align-self: flex-start;
            background-color: var(--msg-bot-bg);
            border: 1px solid var(--secondary-color);
            border-bottom-left-radius: 0;
            color: var(--text-main);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.05);
        }

        .msg-system {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-pixel);
            font-size: 0.8rem;
            text-align: center;
            border: 1px dashed var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
        }

        .dice-result {
            font-family: var(--font-pixel);
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 5px;
            display: block;
        }

        .crit-success { color: #00ffaa; text-shadow: 0 0 5px #00ffaa; }
        .crit-fail { color: #ff0055; text-shadow: 0 0 5px #ff0055; }

        /* 底部输入区 */
        .input-container {
            padding: 15px;
            background: rgba(10, 5, 20, 0.95);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .quick-actions::-webkit-scrollbar { height: 0; }

        .btn-quick {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: var(--font-pixel);
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-quick:hover, .btn-quick:active {
            background: var(--msg-user-bg);
            color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(176, 38, 255, 0.4);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }

        .btn-send {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: var(--font-pixel);
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.4);
        }

        .btn-send:hover, .btn-send:active {
            background: #c852ff;
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.8);
        }

        /* 打字机光标 */
        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
            color: var(--secondary-color);
            margin-left: 2px;
            font-size: 0.8em;
        }
    </style>
</head>

    function insertText(text) {
        userInput.value = text;
        userInput.focus();
    }

    // 获取随机数组元素
    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // 添加消息到聊天区
    function appendMessage(sender, text, isHtml = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender === 'user' ? 'msg-user' : 'msg-bot'}`;
        
        if (sender === 'user') {
            msgDiv.textContent = text;
            chatArea.appendChild(msgDiv);
            scrollToBottom();
        } else {
            // 机器人回复使用打字机效果
            chatArea.appendChild(msgDiv);
            typewriterEffect(msgDiv, text, isHtml);
        }
    }

    // 打字机效果 (速度较快)
    function typewriterEffect(element, text, isHtml) {
        element.classList.add('typing-cursor');
        let i = 0;
        const speed = 20; // 打字速度 (ms)
        
        // 如果是HTML内容（如骰子结果），直接显示以避免标签被截断
        if (isHtml) {
            element.classList.remove('typing-cursor');
            element.innerHTML = text;
            scrollToBottom();
            return;
        }

        function type() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                scrollToBottom();
                setTimeout(type, speed);
            } else {
                element.classList.remove('typing-cursor');
            }
        }
        type();
    }

    // 解析并处理输入
    function processInput(input) {
        const text = input.trim();
        if (!text) return;

        // 显示用户输入
        appendMessage('user', text);
        userInput.value = '';

        // 延迟一点点回复，显得自然
        setTimeout(() => {
            handleLogic(text);
        }, 300);
    }

    // 核心处理逻辑
    function handleLogic(text) {
        // 1. 检查是否为塔罗牌抽取
        if (text.includes("塔罗牌抽取") || text.includes("抽塔罗牌") || text === "塔罗牌") {
            const card = getRandomItem(tarotCards);
            const isReversed = Math.random() > 0.5 ? "逆位" : "正位";
            const reply = `抽取了一张塔罗牌：<br><span style="color:var(--secondary-color); font-weight:bold;">【${card.name}】 (${isReversed})</span><br>代表意象：${card.meaning}`;
            appendMessage('bot', reply, true);
            return;
        }

        // 2. 检查是否为技能判定 (格式: 判定 50 或 50%)
        const checkMatch = text.match(/^(?:判定)?\s*(\d+)(?:%)?$/);
        if (checkMatch) {
            const targetRate = parseInt(checkMatch[1], 10);
            if (targetRate >= 0 && targetRate <= 100) {
                const roll = Math.floor(Math.random() * 100) + 1; // 1-100
                let resultText = "";
                let cssClass = "";

                if (roll >= 1 && roll <= 5) {
                    resultText = "大成功……没意思。";
                    cssClass = "crit-success";
                } else if (roll >= 96 && roll <= 100) {
                    resultText = "大失败！迎接大失败恶魔的爱吧！";
                    cssClass = "crit-fail";
                } else if (roll <= targetRate) {
                    resultText = "只是平凡的成功。";
                } else {
                    resultText = "失败。";
                }

                const reply = `进行技能判定 (目标: ${targetRate}%)<br>
                               <span class="dice-result">D100 = ${roll}</span>
                               <span class="dice-result ${cssClass}">结果：${resultText}</span>`;
                appendMessage('bot', reply, true);
                return;
            }
        }

        // 3. 检查是否为 XdY 骰子指令 (如 3d6, 1d20)
        const diceMatch = text.match(/^(\d+)d(\d+)$/i);
        if (diceMatch) {
            const count = parseInt(diceMatch[1], 10);
            const faces = parseInt(diceMatch[2], 10);
            
            if (count > 0 && count <= 100 && faces > 1 && faces <= 1000) {
                let total = 0;
                let details = [];
                for (let i = 0; i < count; i++) {
                    const roll = Math.floor(Math.random() * faces) + 1;
                    total += roll;
                    details.push(roll);
                }
                
                let detailStr = count > 1 ? ` (${details.join(' + ')})` : '';
                const reply = `掷骰：${count}d${faces}<br><span class="dice-result">拨动了命运的指针 = ${total}${detailStr}</span>`;
                appendMessage('bot', reply, true);
                return;
            } else {
                appendMessage('bot', "骰子参数超出范围。(数量1-100，面数2-1000)");
                return;
            }
        }

        // 4. 检查回复池匹配
        for (const item of replyPool) {
            for (const trigger of item.triggers) {
                // 简单包含匹配，或者可以改为完全匹配，这里使用包含匹配增加容错
                if (text.toLowerCase().includes(trigger.toLowerCase())) {
                    const reply = getRandomItem(item.replies);
                    appendMessage('bot', reply);
                    return;
                }
            }
        }

        // 5. 默认回复 (如果没有匹配到任何指令或关键词)
        const defaultReplies = [
            "我在这里。……Master要我回答另一句，指令未识别。",
            "我在这里。",
            "我听到了。"
        ];
        appendMessage('bot', getRandomItem(defaultReplies));
    }

    // 绑定事件
    sendBtn.addEventListener('click', () => processInput(userInput.value));
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            processInput(userInput.value);
        }
    });

</script>
